target-version = "py314"
line-length = 120
src = ["src"]

[lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "RUF"]
ignore = ["E501"]

[lint.per-file-ignores]
"src/shared/deps/**/*.py" = ["B008"]
"src/module/**/route/**/*.py" = ["B008"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
